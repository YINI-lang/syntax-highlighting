name: Validate strict YINI files in strict mode

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run yini-cli validation
        run: npx yini-cli@latest validate --strict ./sample.strict.yini ./comprehensive-example.strict.yini
